<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明清升官图 - 完整版民俗游戏</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
}

body {
    background-color: #f8f9fa;
    color: #333;
    line-height: 1.6;
}

/* 导航栏（与全站风格统一） */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
}

.navbar-content {
    width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #007bff;
    text-decoration: none;
}

.nav-menu a {
    margin: 0 12px;
    color: #333;
    text-decoration: none;
    font-size: 16px;
    transition: color 0.2s;
}

.nav-menu a:hover {
    color: #007bff;
}

/* 返回按钮 */
.back-btn {
    position: fixed;
    top: 70px;
    left: 20px;
    padding: 8px 16px;
    background: #6c757d;
    color: white;
    border-radius: 4px;
    text-decoration: none;
    font-size: 14px;
    z-index: 99;
}

/* 主容器 */
.main-container {
    max-width: 1200px;
    margin: 100px auto 40px;
    padding: 0 20px;
}

/* 标题区域 */
.title-area {
    text-align: center;
    margin-bottom: 30px;
}

.game-title {
    font-size: 36px;
    color: #2c3e50;
    margin-bottom: 10px;
}

.game-subtitle {
    color: #666;
    font-size: 18px;
}

/* 游戏状态区 */
.status-area {
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
}

.status-item {
    margin: 5px 10px;
}

.status-label {
    font-weight: bold;
    color: #666;
}

.status-value {
    color: #007bff;
    font-size: 18px;
    font-weight: bold;
}

/* 次数限制提示 */
.dice-count {
    background: #fff0f0;
    color: #dc3545;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: bold;
}

.dice-count.warning {
    background: #fff3cd;
    color: #856404;
}

.dice-count.over {
    background: #f8d7da;
    color: #721c24;
}

/* 核心游戏区 */
.game-area {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 30px;
}

/* 棋盘区 */
.board-area {
    flex: 1;
    min-width: 600px;
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-height: 600px;
    overflow-y: auto;
}

.board-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #2c3e50;
    padding-bottom: 10px;
    border-bottom: 2px solid #eee;
}

/* 棋盘格子 */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
}

.grid-item {
    padding: 12px;
    border-radius: 6px;
    border-left: 4px solid #ddd;
    background: #f9f9f9;
    transition: all 0.2s;
}

.grid-item.current {
    border-left-color: #dc3545;
    background: #fff0f0;
    transform: scale(1.02);
}

.grid-item.outer { border-left-color: #007bff; } /* 外圈 */
.grid-item.middle { border-left-color: #28a745; } /* 中圈 */
.grid-item.inner { border-left-color: #dc3545; } /* 内圈 */
.grid-item.special { border-left-color: #ffc107; } /* 特殊事件 */

.grid-name {
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 5px;
}

.grid-grade {
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
}

.grid-rule {
    font-size: 12px;
    color: #888;
}

/* 操作区 */
.operate-area {
    flex: 0 0 300px;
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.operate-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #eee;
}

/* 近五次结果区 */
.recent-results {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 15px;
    margin-bottom: 20px;
}

.recent-title {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #2c3e50;
}

.result-list {
    list-style: none;
}

.result-item {
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
}

.result-item:last-child {
    border-bottom: none;
}

.result-num {
    color: #666;
    font-weight: bold;
}

.result-content {
    color: #333;
}

.result-content.success {
    color: #28a745;
}

.result-content.fail {
    color: #dc3545;
}

.result-content.special {
    color: #ffc107;
}

/* 操作按钮 */
.operate-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.2s;
}

.operate-btn:hover {
    background: #0056b3;
}

.operate-btn:disabled {
    background: #6c757d;
    cursor: not-allowed;
}

/* 结果详情区 */
.result-detail {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 15px;
    margin-bottom: 20px;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 15px;
}

/* 响应式适配 */
@media (max-width: 992px) {
    .game-area {
        flex-direction: column;
    }
    .board-area {
        min-width: 100%;
    }
    .operate-area {
        flex: none;
        width: 100%;
    }
}
</style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="logo">升官图</a>
            <div class="nav-menu">
                <a href="#">首页</a>
                <a href="#">规则</a>
                <a href="#">关于</a>
            </div>
        </div>
    </nav>

    <!-- 返回按钮 -->
    <a href="#" class="back-btn">← 返回</a>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 标题区域 -->
        <div class="title-area">
            <h1 class="game-title">传统升官图游戏</h1>
            <p class="game-subtitle">体验古代官场晋升之路</p>
        </div>

        <!-- 游戏状态区 -->
        <div class="status-area">
            <div class="status-item">
                <span class="status-label">当前官职：</span>
                <span class="status-value" id="current-title">白丁</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前圈层：</span>
                <span class="status-value" id="current-circle">外圈</span>
            </div>
            <div class="status-item dice-count" id="dice-count">
                剩余次数：100/100
            </div>
        </div>

        <!-- 核心游戏区 -->
        <div class="game-area">
            <!-- 棋盘区 -->
            <div class="board-area">
                <h2 class="board-title">升官图棋盘</h2>
                <div class="grid-container" id="board-container">
                    <!-- 棋盘格子将通过JS动态生成 -->
                </div>
            </div>

            <!-- 操作区 -->
            <div class="operate-area">
                <h2 class="operate-title">游戏操作</h2>
                
                <!-- 结果详情 -->
                <div class="result-detail" id="result-detail">
                    点击开始游戏，体验官场沉浮！
                </div>

                <!-- 近五次结果 -->
                <div class="recent-results">
                    <h3 class="recent-title">近五次记录</h3>
                    <ul class="result-list" id="recent-results-list">
                        <!-- 结果记录将通过JS动态生成 -->
                    </ul>
                </div>

                <!-- 操作按钮 -->
                <button class="operate-btn" id="roll-btn">开始游戏/掷骰子</button>
                <button class="operate-btn" id="restart-btn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据配置
        const gameConfig = {
            totalDiceTimes: 100, // 修改1：总次数改为100次
            circles: {
                outer: {
                    name: "外圈",
                    grids: [
                        { id: 1, name: "白丁", grade: "无品", rule: "初始位置" },
                        { id: 2, name: "秀才", grade: "无品", rule: "德+1、才+1、功+1、赃-1" },
                        { id: 3, name: "举人", grade: "无品", rule: "德+2、才+2、功+2、赃-2" },
                        { id: 4, name: "进士", grade: "无品", rule: "德+3、才+3、功+3、赃-3" },
                        { id: 5, name: "县令", grade: "七品", rule: "德+4、才+4、功+4、赃-4" },
                        { id: 6, name: "通判", grade: "六品", rule: "德+5、才+5、功+5、赃-5" },
                        { id: 7, name: "知州", grade: "五品", rule: "德+6、才+6、功+6、赃-6" },
                        { id: 8, name: "知府", grade: "四品", rule: "德+7、才+7、功+7、赃-7" },
                        { id: 9, name: "按察使", grade: "三品", rule: "德+8、才+8、功+8、赃-8" },
                        { id: 10, name: "布政使", grade: "二品", rule: "德+9、才+9、功+9、赃-9" },
                        { id: 11, name: "巡抚", grade: "二品", rule: "德+10、才+10、功+10、赃-10" },
                        { id: 12, name: "总督", grade: "一品", rule: "德+11、才+11、功+11、赃-11" },
                        { id: 13, name: "尚书", grade: "一品", rule: "德+12、才+12、功+12、赃-12" },
                        { id: 14, name: "侍郎", grade: "二品", rule: "德+13、才+13、功+13、赃-13" },
                        { id: 15, name: "御史", grade: "三品", rule: "德+14、才+14、功+14、赃-14" },
                        { id: 16, name: "太师", grade: "超品", rule: "德+15、才+15、功+15、赃-15" }
                    ]
                },
                middle: {
                    name: "中圈",
                    grids: [
                        { id: 17, name: "翰林", grade: "七品", rule: "德+1、才+2、功+1、赃-1" },
                        { id: 18, name: "编修", grade: "六品", rule: "德+2、才+3、功+2、赃-2" },
                        { id: 19, name: "修撰", grade: "五品", rule: "德+3、才+4、功+3、赃-3" },
                        { id: 20, name: "侍读", grade: "四品", rule: "德+4、才+5、功+4、赃-4" },
                        { id: 21, name: "侍讲", grade: "三品", rule: "德+5、才+6、功+5、赃-5" },
                        { id: 22, name: "学士", grade: "二品", rule: "德+6、才+7、功+6、赃-6" },
                        { id: 23, name: "大学士", grade: "一品", rule: "德+7、才+8、功+7、赃-7" },
                        { id: 24, name: "内阁首辅", grade: "超品", rule: "德+8、才+9、功+8、赃-8" }
                    ]
                },
                inner: {
                    name: "内圈",
                    grids: [
                        { id: 25, name: "侍卫", grade: "九品", rule: "德+1、才+1、功+2、赃-1" },
                        { id: 26, name: "校尉", grade: "八品", rule: "德+2、才+2、功+3、赃-2" },
                        { id: 27, name: "都尉", grade: "七品", rule: "德+3、才+3、功+4、赃-3" },
                        { id: 28, name: "将军", grade: "六品", rule: "德+4、才+4、功+5、赃-4" },
                        { id: 29, name: "将军", grade: "五品", rule: "德+5、才+5、功+6、赃-5" },
                        { id: 30, name: "总兵", grade: "四品", rule: "德+6、才+6、功+7、赃-6" },
                        { id: 31, name: "提督", grade: "三品", rule: "德+7、才+7、功+8、赃-7" },
                        { id: 32, name: "将军", grade: "二品", rule: "德+8、才+8、功+9、赃-8" },
                        { id: 33, name: "大将军", grade: "一品", rule: "德+9、才+9、功+10、赃-9" },
                        { id: 34, name: "兵马大元帅", grade: "超品", rule: "德+10、才+10、功+15、赃-10" }
                    ]
                },
                special: {
                    name: "特殊事件",
                    grids: [
                        { id: 99, name: "贪墨", grade: "惩罚", rule: "贬为白丁，重新开始" },
                        { id: 98, name: "加衔", grade: "奖励", rule: "升2级" },
                        { id: 97, name: "京察", grade: "考核", rule: "德才功不足则降1级" }
                    ]
                }
            }
        };

        // 游戏状态管理
        const gameState = {
            currentId: 1,          // 当前位置ID
            currentCircle: "outer", // 当前圈层
            diceRemain: gameConfig.totalDiceTimes, // 剩余次数
            gameWon: false,         // 是否通关
            addTitleBonus: false    // 加衔奖励标记
        };

        // DOM元素
        const elements = {
            currentTitle: document.getElementById('current-title'),
            currentCircle: document.getElementById('current-circle'),
            diceCount: document.getElementById('dice-count'),
            boardContainer: document.getElementById('board-container'),
            rollBtn: document.getElementById('roll-btn'),
            restartBtn: document.getElementById('restart-btn'),
            resultDetail: document.getElementById('result-detail'),
            recentResultsList: document.getElementById('recent-results-list')
        };

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            gameState.currentId = 1;
            gameState.currentCircle = "outer";
            gameState.diceRemain = gameConfig.totalDiceTimes; // 修改2：初始化次数为100
            gameState.gameWon = false;
            gameState.addTitleBonus = false;

            // 渲染棋盘
            renderBoard();
            
            // 更新状态显示
            updateStatusDisplay();
            
            // 清空结果记录
            elements.recentResultsList.innerHTML = '';
            elements.resultDetail.textContent = '点击开始游戏，体验官场沉浮！';
            
            // 启用按钮
            elements.rollBtn.disabled = false;
        }

        // 渲染棋盘
        function renderBoard() {
            elements.boardContainer.innerHTML = '';
            
            // 获取当前圈层的格子
            const currentCircleGrids = gameConfig.circles[gameState.currentCircle].grids;
            
            // 生成格子
            currentCircleGrids.forEach(grid => {
                const gridElement = document.createElement('div');
                gridElement.className = `grid-item ${gameState.currentCircle}`;
                if (grid.id === gameState.currentId) {
                    gridElement.classList.add('current');
                }
                
                gridElement.innerHTML = `
                    <div class="grid-name">${grid.name}</div>
                    <div class="grid-grade">品级：${grid.grade}</div>
                    <div class="grid-rule">规则：${grid.rule}</div>
                `;
                
                elements.boardContainer.appendChild(gridElement);
            });
            
            // 检查是否通关
            checkGameWin();
        }

        // 更新状态显示
        function updateStatusDisplay() {
            // 获取当前官职名称
            const currentGrid = getCurrentGrid();
            elements.currentTitle.textContent = currentGrid.name;
            elements.currentCircle.textContent = gameConfig.circles[gameState.currentCircle].name;
            
            // 更新剩余次数显示
            updateDiceCountDisplay();
            
            // 检查按钮状态
            checkRollButtonStatus();
        }

        // 更新剩余次数显示
        function updateDiceCountDisplay() {
            elements.diceCount.textContent = `剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
            
            // 根据剩余次数设置样式
            if (gameState.diceRemain === 0) {
                elements.diceCount.classList.add('over');
                elements.diceCount.classList.remove('warning');
            } else if (gameState.diceRemain <= 10) {
                elements.diceCount.classList.add('warning');
                elements.diceCount.classList.remove('over');
            } else {
                elements.diceCount.classList.remove('warning', 'over');
            }
        }

        // 检查掷骰子按钮状态
        function checkRollButtonStatus() {
            elements.rollBtn.disabled = gameState.diceRemain === 0 || gameState.gameWon;
        }

        // 获取当前格子信息
        function getCurrentGrid() {
            return gameConfig.circles[gameState.currentCircle].grids.find(
                grid => grid.id === gameState.currentId
            ) || gameConfig.circles.outer.grids[0];
        }

        // 掷骰子（核心逻辑）
        function rollDice() {
            if (gameState.diceRemain === 0 || gameState.gameWon) return;
            
            // 修改3：只在这里扣减1次次数，确保计数准确
            gameState.diceRemain--;
            
            // 随机生成点数类型（德、才、功、赃）
            const pointTypes = ['德', '才', '功', '赃'];
            const randomPoint = pointTypes[Math.floor(Math.random() * pointTypes.length)];
            
            // 根据点数移动位置
            moveByPoint(randomPoint);
            
            // 1%概率触发贪墨（不额外扣次数）
            if (Math.random() < 0.01 && !gameState.gameWon && gameState.diceRemain >= 0) {
                setTimeout(() => {
                    const tanmoTarget = getTargetIdByPoint("tanmo");
                    gameState.currentId = tanmoTarget;
                    updateStatusDisplay();
                    renderBoard();
                }, 1500);
            }
            
            // 更新状态
            updateStatusDisplay();
            renderBoard();
        }

        // 根据点数移动位置
        function moveByPoint(pointType) {
            const currentGrid = getCurrentGrid();
            let newId = gameState.currentId;
            let resultText = '';
            
            // 根据点数类型计算移动
            switch(pointType) {
                case '德':
                    newId += 1;
                    resultText = `掷得【德】！从【${currentGrid.name}】晋升一级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    break;
                case '才':
                    newId += 1;
                    resultText = `掷得【才】！从【${currentGrid.name}】晋升一级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    break;
                case '功':
                    newId += 1;
                    resultText = `掷得【功】！从【${currentGrid.name}】晋升一级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    break;
                case '赃':
                    newId = Math.max(1, newId - 1);
                    resultText = `掷得【赃】！从【${currentGrid.name}】降职一级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    break;
                default:
                    resultText = `触发特殊事件【${pointType}】，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    newId = getTargetIdByPoint(pointType);
            }
            
            // 处理加衔奖励
            if (gameState.addTitleBonus) {
                newId += 1;
                resultText += ' 加衔奖励：再升一级！';
                gameState.addTitleBonus = false;
            }
            
            // 检查圈层边界
            const maxId = gameConfig.circles[gameState.currentCircle].grids.length;
            if (newId > maxId) {
                // 晋升到下一圈层
                if (gameState.currentCircle === 'outer') {
                    gameState.currentCircle = 'middle';
                    newId = 17; // 翰林
                    resultText += ' 成功晋升到中圈！';
                } else if (gameState.currentCircle === 'middle') {
                    gameState.currentCircle = 'inner';
                    newId = 25; // 侍卫
                    resultText += ' 成功晋升到内圈！';
                } else {
                    // 内圈满级
                    newId = maxId;
                    resultText += ' 已达最高官职！';
                }
            }
            
            // 更新位置
            gameState.currentId = newId;
            
            // 更新结果显示
            updateResultDetail(resultText);
            updateRecentResults(resultText, pointType === '赃' ? 'fail' : 'success');
        }

        // 获取特殊事件目标ID
        function getTargetIdByPoint(pointType) {
            const currentGrid = getCurrentGrid();
            let targetId = gameState.currentId;
            let resultText = '';
            
            switch(pointType) {
                case 'tanmo': // 贪墨
                    resultText = `触发贪墨！从【${currentGrid.name}】贬为【白丁】，重新开始！剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    updateResultDetail(resultText);
                    updateRecentResults(resultText, "fail");
                    gameState.currentCircle = "outer";
                    gameState.addTitleBonus = false;
                    targetId = 1;
                    break;
                case 'jiaxian': // 加衔
                    resultText = `触发加衔！下次掷骰子将升2级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                    updateResultDetail(resultText);
                    updateRecentResults(resultText, "special");
                    gameState.addTitleBonus = true;
                    break;
                case 'jingcha': // 京察
                    if (gameState.currentId > 5) {
                        targetId -= 1;
                        resultText = `京察考核不合格！从【${currentGrid.name}】降职一级，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                        updateRecentResults(resultText, "fail");
                    } else {
                        resultText = `京察考核合格！职位不变，剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                        updateRecentResults(resultText, "success");
                    }
                    updateResultDetail(resultText);
                    break;
            }
            
            return targetId;
        }

        // 更新结果详情
        function updateResultDetail(text) {
            elements.resultDetail.textContent = text;
        }

        // 更新近期结果
        function updateRecentResults(text, type) {
            const li = document.createElement('li');
            li.className = 'result-item';
            li.innerHTML = `
                <span class="result-num">${gameConfig.totalDiceTimes - gameState.diceRemain}</span>
                <span class="result-content ${type}">${text}</span>
            `;
            
            // 添加到列表开头
            elements.recentResultsList.insertBefore(li, elements.recentResultsList.firstChild);
            
            // 只保留最近5条记录
            if (elements.recentResultsList.children.length > 5) {
                elements.recentResultsList.removeChild(elements.recentResultsList.lastChild);
            }
        }

        // 检查游戏是否通关
        function checkGameWin() {
            // 内圈最后一个格子为通关
            if (gameState.currentCircle === 'inner' && gameState.currentId === 34) {
                gameState.gameWon = true;
                const winText = `恭喜！你已晋升为【兵马大元帅】，游戏通关！剩余次数：${gameState.diceRemain}/${gameConfig.totalDiceTimes}`;
                updateResultDetail(winText);
                updateRecentResults(winText, "success");
                elements.rollBtn.disabled = true;
            }
            
            // 次数用完游戏结束
            if (gameState.diceRemain === 0 && !gameState.gameWon) {
                const loseText = `次数用尽！你的最终官职是【${getCurrentGrid().name}】，游戏结束！`;
                updateResultDetail(loseText);
                updateRecentResults(loseText, "fail");
            }
        }

        // 绑定事件
        function bindEvents() {
            // 掷骰子按钮
            elements.rollBtn.addEventListener('click', rollDice);
            
            // 重新开始按钮
            elements.restartBtn.addEventListener('click', initGame);
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
            bindEvents();
        });
    </script>
</body>
</html>
