<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客详情 - ChangXuanxu 的个人网站</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            background-image: url("West Lake 1.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 导航栏样式 */
        .navbar {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .navbar-menu {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .navbar-item a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .navbar-item a:hover {
            color: #007bff;
        }

        .navbar-item a.active {
            color: #007bff;
            font-weight: bold;
            border-bottom: 2px solid #007bff;
        }

        /* 博客详情容器 */
        .blog-detail-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 博客详情卡片 */
        .blog-detail-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        /* 博客标题 */
        .blog-detail-title {
            font-size: 28px;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* 博客元信息 */
        .blog-detail-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            color: #888;
            font-size: 14px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
        }

        /* 博客内容 */
        .blog-detail-content {
            line-height: 1.8;
            color: #444;
            font-size: 16px;
        }

        .blog-detail-content p {
            margin-bottom: 20px;
        }

        .blog-detail-content h3 {
            font-size: 20px;
            color: #2c3e50;
            margin: 30px 0 15px;
        }

        .blog-detail-content code {
            background-color: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            color: #dc3545;
            font-family: "Consolas", monospace;
        }

        .blog-detail-content pre {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }

        /* 返回列表按钮 */
        .back-to-list {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .back-to-list:hover {
            background-color: #0056b3;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999;
        }

        #backToTop:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .navbar-menu {
                gap: 16px;
            }

            .blog-detail-title {
                font-size: 24px;
            }

            .blog-detail-card {
                padding: 20px;
            }

            .blog-detail-meta {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">士多啤梨除草机</a>
            <ul class="navbar-menu">
                <li class="navbar-item"><a href="index.html">首页</a></li>
                <li class="navbar-item"><a href="fun-tools.html">趣味组件</a></li>
                <li class="navbar-item"><a href="blog.html" class="active">个人博客</a></li>
                <li class="navbar-item"><a href="#">关于我</a></li>
                <li class="navbar-item"><a href="#">联系我</a></li>
            </ul>
        </div>
    </nav>

    <div class="blog-detail-container">
        <div class="blog-detail-card">
            <h1 class="blog-detail-title" id="blogTitle">加载中...</h1>
            <div class="blog-detail-meta" id="blogMeta">
                <span id="blogDate">加载中...</span>
                <span id="blogCategory">加载中...</span>
                <span id="blogRead">加载中...</span>
            </div>
            <div class="blog-detail-content" id="blogContent">
                <div class="loading">正在加载文章内容...</div>
            </div>
            <a href="blog.html" class="back-to-list">← 返回博客列表</a>
        </div>
    </div>

    <button id="backToTop">↑</button>

    <script>
        // 博客元数据（和blog.html保持一致）
        const blogData = [
            {
                filename: "flower.html",
                title: "花",
                date: "2025-08-24",
                category: "小故事",
                read: 91
            }
        ];

        window.onload = function() {
            document.body.style.opacity = 1;
            loadBlogContent();
        };

        // 加载博客内容
        async function loadBlogContent() {
            // 获取URL中的文件名参数
            const urlParams = new URLSearchParams(window.location.search);
            const filename = decodeURIComponent(urlParams.get('file') || '');
            
            // 找到对应的博客元数据
            const blogMeta = blogData.find(blog => blog.filename === filename);
            if (!blogMeta) {
                document.getElementById('blogTitle').textContent = '文章不存在';
                document.getElementById('blogContent').innerHTML = '<p style="text-align:center; color:red;">抱歉，该文章不存在或已被删除！</p>';
                return;
            }

            // 更新标题和元信息
            document.getElementById('blogTitle').textContent = blogMeta.title;
            document.getElementById('blogDate').textContent = blogMeta.date;
            document.getElementById('blogCategory').textContent = blogMeta.category;
            document.getElementById('blogRead').textContent = `阅读：${blogMeta.read}`;

            // 加载博客文件内容
            try {
                const response = await fetch(`blogs/${filename}`);
                if (!response.ok) throw new Error('文件加载失败');
                const content = await response.text();
                document.getElementById('blogContent').innerHTML = content;
            } catch (error) {
                document.getElementById('blogContent').innerHTML = `<p style="text-align:center; color:red;">文章内容加载失败：${error.message}</p>`;
            }
        }

        // 回到顶部功能
        const backToTopBtn = document.getElementById('backToTop');
        window.onscroll = function() {
            backToTopBtn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? 'block' : 'none';
        };

        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
