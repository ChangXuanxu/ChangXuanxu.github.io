<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangXuanxu 的个人网站</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            background-image: url("West Lake 1.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 导航栏样式（核心） */
        .navbar {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .navbar-menu {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .navbar-item a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .navbar-item a:hover {
            color: #007bff;
        }

        .navbar-item a.active {
            color: #007bff;
            font-weight: bold;
            border-bottom: 2px solid #007bff;
        }

        /* 大字时钟容器 */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px); /* 减去导航栏高度 */
            padding: 20px;
            text-align: center;
        }

        /* 大字时间样式（优化字体和视觉效果） */
        #time {
            font-size: 8vw; /* 响应式字体，随屏幕缩放 */
            font-weight: 700;
            /* 更换为更美观的无衬线字体组合 */
            font-family: "Inter", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            /* 增强文字阴影，提升层次感和可读性 */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2), 
                         0 4px 20px rgba(0, 0, 0, 0.3),
                         0 0 30px rgba(0, 123, 255, 0.4);
            /* 轻微的文字间距，提升美观度 */
            letter-spacing: 0.05em;
        }

        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999;
        }

        #backToTop:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        /* 响应式适配（移动端） */
        @media (max-width: 768px) {
            #time {
                font-size: 12vw;
                letter-spacing: 0.03em; /* 移动端微调字间距 */
            }

            .navbar-menu {
                gap: 16px;
            }
        }
    </style>
    <!-- 可选：引入外部美观字体（Inter），提升字体效果 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">士多啤梨除草机</a>
            <ul class="navbar-menu">
                <li class="navbar-item"><a href="index.html" class="active">首页</a></li>
                <li class="navbar-item"><a href="fun-tools.html">趣味组件</a></li>
                <li class="navbar-item"><a href="blog.html">个人博客</a></li>
                <li class="navbar-item"><a href="games.html">小游戏合集</a></li>   
                <li class="navbar-item"><a href="#">联系我</a></li>   <!-- 预留 -->
            </ul>
        </div>
    </nav>

    <!-- 大字时钟区域（移除日期显示） -->
    <div class="clock-container">
        <div id="time">00:00:00</div>
    </div>

    <!-- 回到顶部按钮 -->
    <button id="backToTop">↑</button>

    <script>
        // 页面加载淡入
        window.onload = function() {
            document.body.style.opacity = 1;
            updateClock(); // 初始化时钟
        };

        // 实时更新时钟（每秒）
        function updateClock() {
            const now = new Date();
            // 格式化时间：时:分:秒（补零）
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 仅更新时间（移除日期相关逻辑）
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);

        // 回到顶部功能
        const backToTopBtn = document.getElementById('backToTop');
        window.onscroll = function() {
            backToTopBtn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? 'block' : 'none';
        };

        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
