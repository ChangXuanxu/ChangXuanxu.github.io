<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChangXuanxu 的个人网站</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            background-image: url("West Lake 1.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 导航栏样式（核心） */
        .navbar {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .navbar-menu {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .navbar-item a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .navbar-item a:hover {
            color: #007bff;
        }

        .navbar-item a.active {
            color: #007bff;
            font-weight: bold;
            border-bottom: 2px solid #007bff;
        }

        /* 大字时钟容器 */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px); /* 减去导航栏高度 */
            padding: 20px;
            text-align: center;
        }

        /* 大字时间样式 */
        #time {
            font-size: 8vw; /* 响应式字体，随屏幕缩放 */
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            font-family: "Consolas", "Monaco", monospace;
        }

        /* 日期样式 */
        #date {
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px; /* 给天气组件留出空间 */
        }

        /* 天气组件样式（极简风格） */
        .weather-card {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 280px;
            justify-content: center;
        }

        .weather-icon {
            font-size: 40px;
        }

        .weather-info {
            text-align: left;
        }

        .weather-city {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .weather-temp {
            font-size: 22px;
            font-weight: bold;
            color: #007bff;
        }

        .weather-desc {
            font-size: 14px;
            color: #666;
        }

        .weather-loading {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-size: 16px;
        }

        /* 回到顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 50%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999;
        }

        #backToTop:hover {
            background-color: #0056b3;
            transform: scale(1.1);
        }

        /* 响应式适配（移动端） */
        @media (max-width: 768px) {
            #time {
                font-size: 12vw;
            }

            .navbar-menu {
                gap: 16px;
            }

            .weather-card {
                padding: 12px 20px;
                gap: 15px;
                min-width: 240px;
            }

            .weather-icon {
                font-size: 32px;
            }

            .weather-temp {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">士多啤梨除草机</a>
            <ul class="navbar-menu">
                <li class="navbar-item"><a href="index.html" class="active">首页</a></li>
                <li class="navbar-item"><a href="fun-tools.html">趣味组件</a></li>
                <li class="navbar-item"><a href="blog.html">个人博客</a></li>
                <li class="navbar-item"><a href="games.html">小游戏合集</a></li>   
                <li class="navbar-item"><a href="#">联系我</a></li>   <!-- 预留 -->
            </ul>
        </div>
    </nav>

    <!-- 大字时钟区域 -->
    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div id="date">2026年03月06日 星期五</div>
        <!-- 天气组件 -->
        <div id="weather-container" class="weather-loading">正在获取天气信息...</div>
    </div>

    <!-- 回到顶部按钮 -->
    <button id="backToTop">↑</button>

    <script>
        // 页面加载淡入
        window.onload = function() {
            document.body.style.opacity = 1;
            updateClock(); // 初始化时钟
            initWeather(); // 初始化天气组件
        };

        // 实时更新时钟（每秒）
        function updateClock() {
            const now = new Date();
            // 格式化时间：时:分:秒（补零）
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            // 格式化日期：年-月-日 星期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            
            // 更新DOM
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').textContent = `${year}年${month}月${day}日 ${weekday}`;
        }
        setInterval(updateClock, 1000);

        // 天气组件核心逻辑（调用Cloudflare代理，无API Key泄露）
        function initWeather() {
            // 🔴 替换为你的Cloudflare Worker域名！
            // 示例：https://weather-proxy-123.yourname.workers.dev
            const PROXY_URL = 'https://rapid-cell-e3dc.13002218798.workers.dev/'; 
            const weatherContainer = document.getElementById('weather-container');

            // 天气图标映射
            const weatherIconMap = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '⛅',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌦️', '10n': '🌦️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };

            // 温度转换：开尔文转摄氏度
            function kelvinToCelsius(kelvin) {
                return (kelvin - 273.15).toFixed(1);
            }

            // 获取定位并加载天气
            if (!navigator.geolocation) {
                weatherContainer.innerHTML = '<div class="weather-loading">浏览器不支持定位</div>';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                // 定位成功
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // 调用Cloudflare代理接口（无API Key暴露）
                    fetch(`${PROXY_URL}?lat=${lat}&lon=${lon}`)
                        .then(res => {
                            if (!res.ok) throw new Error('获取失败');
                            return res.json();
                        })
                        .then(data => {
                            // 处理OpenWeatherMap返回数据
                            const weather = data.weather[0];
                            const main = data.main;
                            const icon = weatherIconMap[weather.icon] || '🌡️';
                            const temp = kelvinToCelsius(main.temp);
                            const city = data.name;
                            const desc = weather.description.replace(/^\w/, c => c.toUpperCase());

                            // 渲染天气卡片
                            weatherContainer.className = 'weather-card';
                            weatherContainer.innerHTML = `
                                <div class="weather-icon">${icon}</div>
                                <div class="weather-info">
                                    <div class="weather-city">${city}</div>
                                    <div class="weather-temp">${temp}°C</div>
                                    <div class="weather-desc">${desc}</div>
                                </div>
                            `;
                        })
                        .catch(err => {
                            weatherContainer.innerHTML = '<div class="weather-loading">天气获取失败</div>';
                            console.error('天气代理接口错误：', err);
                        });
                },
                // 定位失败
                function() {
                    weatherContainer.innerHTML = '<div class="weather-loading">无法获取位置</div>';
                }
            );
        }

        // 回到顶部功能
        const backToTopBtn = document.getElementById('backToTop');
        window.onscroll = function() {
            backToTopBtn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? 'block' : 'none';
        };

        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
