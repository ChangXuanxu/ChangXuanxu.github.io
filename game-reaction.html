<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应速度测试 - 士多啤梨除草机</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #f8f9fa;
        }

        /* 导航栏 - 保持网站风格统一 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .navbar-content {
            width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .nav-menu a {
            margin: 0 12px;
            color: #333;
            text-decoration: none;
            font-size: 16px;
        }

        .nav-menu a:hover {
            color: #007bff;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 70px;
            left: 20px;
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            z-index: 100;
        }

        /* 核心游戏区域 - 全屏 */
        .game-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
            z-index: 10;
        }

        /* 游戏状态文本 */
        .game-status {
            font-size: 32px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            user-select: none;
        }

        /* 结果展示区域 */
        .game-result {
            display: none;
            text-align: center;
            margin-bottom: 30px;
        }

        .result-item {
            margin: 10px 0;
        }

        .current-time {
            font-size: 48px;
            font-weight: bold;
            color: #dc3545;
        }

        .avg-time {
            font-size: 28px;
            color: #007bff;
        }

        .rank-text {
            font-size: 20px;
            color: #28a745;
        }

        /* 按钮样式 */
        .game-button {
            padding: 14px 36px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007bff;
            color: white;
            transition: background 0.2s;
            margin: 0 10px;
        }

        .game-button:hover {
            background: #0056b3;
        }

        .restart-btn {
            background: #ffc107;
            color: #2c3e50;
            display: none;
        }

        .restart-btn:hover {
            background: #e0a800;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="logo">士多啤梨除草机</a>
            <div class="nav-menu">
                <a href="index.html">首页</a>
                <a href="fun-tools.html">趣味组件</a>
                <a href="blog.html">个人博客</a>
                <a href="games.html">小游戏</a>
                <a href="#">联系我</a>
            </div>
        </div>
    </nav>

    <!-- 返回按钮 -->
    <a href="games.html" class="back-btn">← 返回小游戏合集</a>

    <!-- 核心游戏区域 -->
    <div class="game-container" id="gameContainer">
        <!-- 状态文本 -->
        <div class="game-status" id="gameStatus">点击开始测试，等待屏幕变蓝后点击屏幕</div>
        
        <!-- 结果展示 -->
        <div class="game-result" id="gameResult">
            <div class="result-item current-time" id="currentTime"></div>
            <div class="result-item avg-time" id="avgTime"></div>
            <div class="result-item rank-text" id="rankText"></div>
        </div>
        
        <!-- 控制按钮 -->
        <button class="game-button start-btn" id="startBtn">开始测试</button>
        <button class="game-button restart-btn" id="restartBtn">再来一次</button>
    </div>

    <script>
        // 核心变量 - 极简设计
        const game = {
            // DOM元素
            container: document.getElementById('gameContainer'),
            status: document.getElementById('gameStatus'),
            result: document.getElementById('gameResult'),
            currentTime: document.getElementById('currentTime'),
            avgTime: document.getElementById('avgTime'),
            rankText: document.getElementById('rankText'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn'),
            
            // 游戏状态
            isTesting: false,    // 是否正在测试中
            isActive: false,     // 屏幕是否已变蓝可点击
            startTime: 0,        // 屏幕变蓝的时间戳
            reactionTimes: [],   // 存储所有有效反应时间
            
            // 初始化
            init() {
                // 绑定事件
                this.startBtn.addEventListener('click', () => this.startTest());
                this.restartBtn.addEventListener('click', () => this.resetGame());
                this.container.addEventListener('click', (e) => this.handleClick(e));
                
                // 初始状态
                this.resetGame();
            },
            
            // 开始测试
            startTest() {
                // 重置UI
                this.startBtn.style.display = 'none';
                this.result.style.display = 'none';
                this.container.style.background = '#ffffff';
                
                // 更新状态
                this.isTesting = true;
                this.isActive = false;
                this.status.textContent = '等待屏幕变蓝...';
                
                // 随机延迟 1-5 秒后变蓝
                const delay = Math.floor(Math.random() * 4000) + 1000;
                setTimeout(() => {
                    // 防止测试已终止仍触发
                    if (!this.isTesting) return;
                    
                    // 屏幕变蓝，激活点击
                    this.container.style.background = '#007bff';
                    this.status.textContent = '立即点击屏幕！';
                    this.startTime = Date.now();
                    this.isActive = true;
                    this.isTesting = false;
                }, delay);
            },
            
            // 处理点击事件（核心逻辑）
            handleClick(e) {
                // 过滤按钮点击（只响应空白区域）
                if (e.target === this.startBtn || e.target === this.restartBtn) {
                    return;
                }
                
                // 1. 未开始测试 - 无反应
                if (!this.isTesting && !this.isActive) {
                    return;
                }
                
                // 2. 提前点击（作弊）
                if (this.isTesting && !this.isActive) {
                    this.isTesting = false;
                    this.status.textContent = '作弊！请等待屏幕变蓝';
                    this.startBtn.style.display = 'inline-block';
                    return;
                }
                
                // 3. 有效点击（屏幕已变蓝）
                if (this.isActive) {
                    // 计算反应时间
                    const endTime = Date.now();
                    const time = endTime - this.startTime;
                    
                    // 只记录有效时间（0-10秒）
                    if (time > 0 && time < 10000) {
                        this.reactionTimes.push(time);
                    }
                    
                    // 重置状态
                    this.isActive = false;
                    this.container.style.background = '#ffffff';
                    
                    // 显示结果
                    this.showResult(time);
                }
            },
            
            // 显示测试结果
            showResult(time) {
                // 本轮时间
                this.currentTime.textContent = `${time} ms`;
                
                // 平均时间
                const avg = this.reactionTimes.length > 0 
                    ? Math.round(this.reactionTimes.reduce((a, b) => a + b) / this.reactionTimes.length)
                    : 0;
                this.avgTime.textContent = `平均：${avg} ms`;
                
                // 评级
                let rank = '';
                if (time < 150) rank = '超神！职业选手水平';
                else if (time < 200) rank = '优秀！远超普通人';
                else if (time < 300) rank = '良好！高于平均';
                else if (time < 400) rank = '及格！普通水平';
                else rank = '加油！多玩能提升';
                this.rankText.textContent = rank;
                
                // 更新UI
                this.status.textContent = '测试完成';
                this.result.style.display = 'block';
                this.restartBtn.style.display = 'inline-block';
            },
            
            // 重置游戏
            resetGame() {
                // 重置状态
                this.isTesting = false;
                this.isActive = false;
                this.reactionTimes = [];
                
                // 重置UI
                this.container.style.background = '#ffffff';
                this.status.textContent = '点击开始测试，等待屏幕变蓝';
                this.result.style.display = 'none';
                this.startBtn.style.display = 'inline-block';
                this.restartBtn.style.display = 'none';
            }
        };

        // 初始化游戏
        game.init();
    </script>
</body>
</html>
