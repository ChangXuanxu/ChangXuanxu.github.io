<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应速度测试 - 士多啤梨除草机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            overflow: hidden;
        }

        /* 导航栏 */
        .navbar {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .navbar-logo {
            font-size: 20px;
            font-weight: bold;
            color: #007bff;
            text-decoration: none;
        }

        .navbar-menu {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        .navbar-item a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .navbar-item a:hover {
            color: #007bff;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 70px;
            left: 20px;
            padding: 8px 16px;
            font-size: 14px;
            background-color: #6c757d;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1001;
            text-decoration: none;
        }

        .back-btn:hover {
            background-color: #545b62;
        }

        /* 全屏游戏区域 */
        .game-full {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 1;
        }

        /* 游戏状态文字 */
        .status {
            font-size: 26px;
            margin-bottom: 20px;
            color: #333;
            z-index: 10;
            pointer-events: none;
        }

        .result {
            font-size: 34px;
            font-weight: bold;
            color: #dc3545;
            margin: 10px 0;
            z-index: 10;
            pointer-events: none;
        }

        .level {
            font-size: 20px;
            color: #007bff;
            z-index: 10;
            pointer-events: none;
        }

        /* 按钮 */
        .btn {
            padding: 14px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            z-index: 10;
        }

        .start {
            background: #007bff;
            color: white;
        }

        .restart {
            background: #ffc107;
            color: #333;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>

<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">士多啤梨除草机</a>
            <ul class="navbar-menu">
                <li class="navbar-item"><a href="index.html">首页</a></li>
                <li class="navbar-item"><a href="fun-tools.html">趣味组件</a></li>
                <li class="navbar-item"><a href="blog.html">个人博客</a></li>
                <li class="navbar-item"><a href="games.html">小游戏</a></li>
                <li class="navbar-item"><a href="#">联系我</a></li>
            </ul>
        </div>
    </nav>

    <a href="games.html" class="back-btn">← 返回小游戏合集</a>

    <!-- 全屏游戏区 -->
    <div class="game-full" id="gameArea">
        <div class="status" id="status">等待开始…</div>
        <div class="result hide" id="result"></div>
        <div class="level hide" id="level"></div>
        <button class="btn start" id="startBtn">开始测试</button>
        <button class="btn restart hide" id="restartBtn">再来一次</button>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const level = document.getElementById('level');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let startTime = 0;
        let isWaiting = false;

        // 开始
        startBtn.onclick = () => {
            startBtn.classList.add('hide');
            result.classList.add('hide');
            level.classList.add('hide');
            status.textContent = '等待变色…';
            gameArea.style.background = '#ffffff';

            const delay = Math.random() * 3000 + 1000;
            isWaiting = true;

            setTimeout(() => {
                if (!isWaiting) return;
                gameArea.style.background = '#007bff'; // 全屏变蓝
                startTime = Date.now();
                status.textContent = '点！';
            }, delay);
        };

        // 点击全屏
        gameArea.onclick = () => {
            if (!isWaiting) return;
            isWaiting = false;

            const time = Date.now() - startTime;
            result.textContent = `${time} ms`;
            result.classList.remove('hide');

            let text = '';
            if (time < 180) text = '🏆 超神反应！';
            else if (time < 250) text = '⚡ 顶尖水平';
            else if (time < 350) text = '👍 正常偏快';
            else if (time < 450) text = '🙂 普通人类水平';
            else text = '💤 再练练～';

            level.textContent = text;
            level.classList.remove('hide');
            status.textContent = '测试完成';
            restartBtn.classList.remove('hide');
        };

        // 重置
        restartBtn.onclick = () => {
            restartBtn.classList.add('hide');
            startBtn.classList.remove('hide');
            gameArea.style.background = '#ffffff';
            status.textContent = '等待开始…';
        };
    </script>
</body>
</html>
